plugins {
    id "java"
    id "application"
    id "com.gradleup.shadow" version "8.3.0"
    id "org.beryx.jlink" version "3.1.5"
    id "org.openjfx.javafxplugin" version "0.1.0"
    id "com.gluonhq.gluonfx-gradle-plugin" version "1.0.28" //This is latest already don't touch
}

group = "com.mystic"
version = "3.0.0"

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

application {
    mainClass = "com.mystic.tarotboard.TarotBoard" //gluon see this
}

repositories {
    mavenCentral()
    google()
    maven {
        url 'https://nexus.gluonhq.com/nexus/content/repositories/releases'
    }
}

// --- COMMON CONFIGURATION ---
java {
    modularity.inferModulePath = true
}

dependencies {
    implementation "com.google.code.gson:gson:2.10.1"
}

// --- JAVAFX & DESKTOP (JLINK/JPACKAGE) CONFIGURATION ---
javafx {
    version = "21.0.1"
    modules = ["javafx.controls", "javafx.fxml", "javafx.graphics"]
}

application {
    mainClass = "com.mystic.tarotboard.TarotBoard"

    applicationDefaultJvmArgs = [
            "--enable-native-access=javafx.graphics"
    ]
}

def jpackageType = project.findProperty('installerType') ?: 'msi'

jlink {
    imageZip = layout.buildDirectory.get().file("distributions/app-${javafx.platform.classifier}.zip").asFile
    options = ["--strip-debug", "--compress", "2", "--no-header-files", "--no-man-pages"]
    launcher {
        name = "TarotBoard"
        mainClass = "com.mystic.tarotboard.TarotBoard"
        noConsole = true
    }

    jpackage {
        imageName = "TarotBoard"
        skipInstaller = project.findProperty('skipInstaller')?.toBoolean() ?: (jpackageType == 'app-image')
        installerType = jpackageType
        if (project.hasProperty('installerOptions')) {
            installerOptions = project.getProperty('installerOptions').split(',')
        } else if (jpackageType == 'msi' || jpackageType == 'exe') {
            installerOptions = ['--win-shortcut', '--win-menu', '--win-dir-chooser']
        } else {
            installerOptions = []
        }
    }
}

jlinkZip {
    group = "distribution"
}

shadowJar {
    manifest.attributes("Main-Class": "com.mystic.tarotboard.TarotBoard")
}

jar {
    manifest.attributes("Main-Class": "com.mystic.tarotboard.TarotBoard")
}

tasks.register('runServer', JavaExec) {
    group = 'application'
    description = 'Run the headless dedicated server'
    mainClass = 'com.mystic.tarotboard.network.server.HeadlessServer'
    classpath = sourceSets.main.runtimeClasspath
}

// --- ANDROID (GLUONFX) CONFIGURATION ---
gluonfx {
    target = "android"
    appIdentifier = 'com.mystic.tarotboard'
    
    attachConfig {
        version = '4.0.20'
        services 'lifecycle'
    }

    release {
        appLabel = 'TarotBoard'
        versionCode = 1
        versionName = '1.0'
    }
}
