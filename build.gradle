plugins {
    id "java"
    id "application"
    id "com.gradleup.shadow" version "9.4.1"
    id "org.beryx.jlink" version "3.1.5"
    id "org.openjfx.javafxplugin" version "bf3c04dd64"
    id "org.gradlex.extra-java-module-info" version "1.9"
}

group "com.mystic"
version "3.0.0"

java.toolchain.languageVersion = JavaLanguageVersion.of(26)

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

application {
    mainClass = "com.mystic.tarotboard.TarotBoard"
    applicationDefaultJvmArgs = [
        '--enable-native-access=javafx.graphics',
        '--enable-native-access=javafx.web'
    ]
}

repositories {
    mavenCentral()
}

extraJavaModuleInfo {
    failOnMissingModuleInfo = false // Let non-critical transitives stay on classpath

    // Core and Utils (for Parser, HtmlRenderer, and MutableDataSet)
    automaticModule("flexmark-0.64.8.jar", "flexmark")
    automaticModule("flexmark-util-data-0.64.8.jar", "flexmark.util.data")

    // Extension (for TablesExtension)
    automaticModule("flexmark-ext-tables-0.64.8.jar", "flexmark.ext.tables")
    automaticModule("flexmark-util-ast-0.64.8.jar", "flexmark.util.ast")
}

javafx {
    version = "27-ea+15"
    modules = ["javafx.controls", "javafx.fxml", "javafx.graphics", "javafx.swing", "javafx.web", "jdk.jsobject"]
}

dependencies {
    implementation "com.vladsch.flexmark:flexmark-all:0.64.8"
    implementation "com.google.code.gson:gson:2.10.1" // Added Gson dependency
}

jlink {
    imageZip = layout.buildDirectory.get().file("distributions/app-${javafx.platform.classifier}.zip").asFile
    options = ["--strip-debug", "--compress", "2", "--no-header-files", "--no-man-pages"]
    launcher {
        name = "TarotBoard"
        mainClass = "com.mystic.tarotboard.Launcher"
        noConsole = true
    }

    jpackage {
        imageName = "TarotBoard"
        skipInstaller = false
        installerType = "msi"
        installerOptions = ['--win-shortcut', '--win-menu', '--win-dir-chooser']
    }
}

jlinkZip {
    group = "distribution"
}

shadowJar {
    manifest.attributes("Main-Class": "com.mystic.tarotboard.Launcher")
}

jar {
    manifest.attributes("Main-Class": "com.mystic.tarotboard.Launcher")
}