import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar

// The GluonFX plugin is only on the classpath when an Android build is requested
// (-PandroidBuild), so desktop builds never resolve or load it.
buildscript {
    repositories {
        maven { url "https://plugins.gradle.org/m2/" }
    }
    dependencies {
        if (project.hasProperty("androidBuild")) {
            classpath "com.gluonhq:gluonfx-gradle-plugin:1.0.25"
        }
    }
}

plugins {
    id "java"
    id "application"
    id "com.gradleup.shadow" version "8.3.0"
    id "org.beryx.jlink" version "3.1.5"
    id "org.openjfx.javafxplugin" version "0.1.0"
    id "org.gradlex.extra-java-module-info" version "1.9"
}

group = "com.mystic"
version = "3.0.0"

// The Android lane pins GluonFX 1.0.25 (Substrate 0.0.65) against Gluon's own
// GraalVM java23 build; the two are a matched set and neither half can move alone:
//
//   - Substrate >= 0.0.66 hardcodes -H:+ForceNoROSectionRelocations, an option no
//     current GraalVM (Gluon's fork included) still defines, so those versions
//     cannot link against any available GraalVM.
//   - Substrate always passes -H:+UseCAPCache and ships the CAP cache it uses for
//     Android cross-compilation.  Only the 0.0.64/0.0.65 cache contains
//     CLOCK_REALTIME, which GraalVM 23's PosixDirectives requires; the caches in
//     0.0.63 and 0.0.66+ predate it and fail with "Missing CAP cache value".
//
// The cache is not optional (cross-compiled aarch64 probes cannot run on the x64
// builder), so 0.0.64/0.0.65 are the only versions that satisfy both constraints.
// Desktop builds stay on 26; --release 21 keeps the sources honest on every lane.
java.toolchain.languageVersion = JavaLanguageVersion.of(project.hasProperty("androidBuild") ? 23 : 26)

repositories {
    mavenCentral()
    maven { url 'https://www.jupnp.org/nexus/content/repositories/releases/' }
}

extraJavaModuleInfo {
    failOnMissingModuleInfo = false
    automaticModule("weupnp-0.1.4.jar", "weupnp")
}

dependencies {
    implementation "com.google.code.gson:gson:2.10.1"
    implementation('org.bitlet:weupnp:0.1.4')
}

javafx {
    // The Android lane compiles against JavaFX 21 so the API surface matches the
    // JavaFX 21-ea static SDK that GluonFX 1.0.23's Substrate bundles; desktop
    // keeps the 26 runtime.
    version = project.hasProperty("androidBuild") ? "21.0.2" : "26.0.1"
    modules = ["javafx.controls", "javafx.fxml", "javafx.graphics"]
}

java {
    modularity.inferModulePath = true
}

// The sources are kept at Java 21 for Substrate / Android compatibility: the
// bytecode level is locked to 21 via --release regardless of the host JDK, making any
// newer language feature or JDK API a compile error on every lane.
tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

application {
    mainModule = "tarotboard"
    mainClass = "com.mystic.tarotboard.TarotBoard"

    applicationDefaultJvmArgs = [
            "--enable-native-access=javafx.graphics",
            "--add-opens", "tarotboard/com.mystic.tarotboard.theming.configs=com.google.gson",
            "--add-opens", "tarotboard/com.mystic.tarotboard.theming=com.google.gson"
    ]
}

def jpackageType = project.findProperty("installerType") ?: "msi"
def isServerBuild = project.hasProperty("buildServer")

jlink {
    imageZip = layout.buildDirectory.get().file("distributions/app-${javafx.platform.classifier}.zip").asFile
    options = [
            "--strip-debug",
            "--compress", "2",
            "--no-header-files",
            "--no-man-pages",
            "--add-modules", "weupnp,com.google.gson"
    ]
    
    if (isServerBuild) {
        launcher {
            name = "TarotBoard-Server"
            mainClass = "com.mystic.tarotboard.network.server.HeadlessServerLauncher"
            noConsole = true // Suppress terminal, use LogWindow
            jvmArgs = [
                "--add-opens", "tarotboard/com.mystic.tarotboard.theming.configs=com.google.gson",
                "--add-opens", "tarotboard/com.mystic.tarotboard.theming=com.google.gson"
            ]
        }
        jpackage {
            imageName = "TarotBoard-Server"
            skipInstaller = project.findProperty("skipInstaller")?.toBoolean() ?: (jpackageType == "app-image")
            installerType = jpackageType

            if (project.hasProperty("installerOptions")) {
                installerOptions = project.getProperty("installerOptions").split(',')
            } else if (jpackageType == "msi" || jpackageType == "exe") {
                installerOptions = ['--win-shortcut', '--win-menu', '--win-dir-chooser']
            } else {
                installerOptions = []
            }
        }
    } else {
        launcher {
            name = "TarotBoard"
            mainClass = "com.mystic.tarotboard.TarotBoard"
            noConsole = true // Suppress terminal for client as well
        }
        jpackage {
            imageName = "TarotBoard"
            skipInstaller = project.findProperty("skipInstaller")?.toBoolean() ?: (jpackageType == "app-image")
            installerType = jpackageType

            if (project.hasProperty("installerOptions")) {
                installerOptions = project.getProperty("installerOptions").split(',')
            } else if (jpackageType == "msi" || jpackageType == "exe") {
                installerOptions = ['--win-shortcut', '--win-menu', '--win-dir-chooser']
            } else {
                installerOptions = []
            }
        }
    }
}

jlinkZip {
    group = "distribution"
}

shadowJar {
    manifest.attributes("Main-Class": "com.mystic.tarotboard.TarotBoard")
}

jar {
    manifest.attributes("Main-Class": "com.mystic.tarotboard.TarotBoard")
}

// Add instructions for shadowJar to include the Gson module opens
tasks.withType(com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar) {
    manifest {
        attributes(
                "Add-Opens": "tarotboard/com.mystic.tarotboard.theming.configs=com.google.gson tarotboard/com.mystic.tarotboard.theming=com.google.gson"
        )
    }
}

tasks.register("runServer", JavaExec) {
    group = "application"
    description = "Run the headless dedicated server"
    mainClass = "com.mystic.tarotboard.network.server.HeadlessServer"
    classpath = sourceSets.main.runtimeClasspath
}

// The panel is a JavaFX app, so unlike runServer it has to launch on the module path.
tasks.register("runServerPanel", JavaExec) {
    group = "application"
    description = "Run the dedicated server with the startup configuration panel"
    mainModule = "tarotboard"
    mainClass = "com.mystic.tarotboard.network.server.HeadlessServerLauncher"
    classpath = sourceSets.main.runtimeClasspath
    jvmArgs = ["--enable-native-access=javafx.graphics"]
}

tasks.register("serverJar", ShadowJar) {
    group = "distribution"
    description = "Build a plain runnable jar of the headless dedicated server"
    archiveBaseName = "TarotBoard-Server"
    archiveClassifier = ""
    from sourceSets.main.output
    configurations = [project.configurations.runtimeClasspath]
    manifest.attributes("Main-Class": "com.mystic.tarotboard.network.server.HeadlessServer")
    // A classpath jar, not a module — and the console server never loads a JavaFX class,
    // so the platform-specific JavaFX jars would be pure dead weight inside it.
    exclude "module-info.class"
    exclude "META-INF/versions/*/module-info.class"
    dependencies {
        exclude(dependency("org.openjfx:.*"))
    }
}

if (project.hasProperty("androidBuild")) {
    apply plugin: "com.gluonhq.gluonfx-gradle-plugin"
    gluonfx {
        target = "android"
        // Gson fills these in reflectively, and native-image keeps reflective access
        // only for classes named here. Unregistered, the ThemeManager static block
        // still "succeeds" — it catches the failure and logs it — but leaves the theme
        // registries empty, so the first getSuitColor() throws out of start().
        //
        // java.lang.Class and RecordComponent are here because Gson reaches the record
        // API reflectively (Class.getMethod("getRecordComponents"), and getName/getType
        // on the result) rather than calling it directly. Without them that lookup
        // fails, Gson decides records are unsupported, and falls back to writing fields
        // directly — which on a record's final fields throws IllegalAccessException.
        // SuitStyle and GuiStyle are records, so they need this; the plain classes here
        // do not.
        reflectionList = [
                'com.mystic.tarotboard.theming.ThemeConfiguration',
                'com.mystic.tarotboard.theming.ThemeConfiguration$GuiConfig',
                'com.mystic.tarotboard.theming.ThemeConfiguration$CursorConfig',
                'com.mystic.tarotboard.theming.SuitStyle',
                'com.mystic.tarotboard.theming.GuiStyle',
                'com.mystic.tarotboard.theming.configs.KeyBindConfig',
                'java.lang.Class',
                'java.lang.reflect.RecordComponent'
        ]
        // Multiplayer moves NetworkMessage over ObjectOutputStream, and native-image supports
        // java.io serialization only for classes named in a serialization config — there is no
        // reflectionList-style DSL for it, hence the raw argument. Unregistered, the first
        // writeObject() throws UnsupportedFeatureError, which is an Error: neither send()'s
        // catch nor joinGame()'s catch(IOException) sees it, so the socket connects and the
        // join then dies silently before the scene switch.
        // Passed as a file rather than -H:SerializationConfigurationResources, which resolves
        // through ClassLoader.getResources() and so depends on the builder classpath carrying
        // the processed resources. A path resolved by Gradle has no such dependency. The build
        // still fails loudly if the file is missing, which is the point: a serialization config
        // that silently goes unparsed is exactly the failure this is meant to prevent.
        compilerArgs = [
                "-H:SerializationConfigurationFiles=" + file(
                        "src/main/resources/META-INF/native-image/com.mystic/tarotboard/serialization-config.json")
                        .absolutePath
        ]
    }
}
