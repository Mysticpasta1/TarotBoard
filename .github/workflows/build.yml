name: Build And Release

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows (MSI + EXE)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ msi, exe ]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build ${{ matrix.type }}
        run: ./gradlew.bat clean jpackage -PinstallerType=${{ matrix.type }}
        shell: cmd

      - name: Upload ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.type }}-build
          path: build/jpackage/TarotBoard-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  linux:
    name: Linux Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ app-image, deb, rpm ]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot rpm

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build ${{ matrix.type }}
        run: ./gradlew clean jpackage -PinstallerType=${{ matrix.type }}

      - name: Archive Package
        run: |
          if [ "${{ matrix.type }}" = "app-image" ]; then
            tar -czf TarotBoard-linux-${{ matrix.type }}.tar.gz -C build/jpackage TarotBoard/
          else
            tar -czf TarotBoard-linux-${{ matrix.type }}.tar.gz -C build/jpackage .
          fi

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.type }}-build
          path: TarotBoard-linux-${{ matrix.type }}.tar.gz
          compression-level: 6
          if-no-files-found: error

  flatpak:
    name: Flatpak Build
    runs-on: ubuntu-latest
    needs: [ linux ]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-app-image-build
          path: app-image-artifact

      - name: Extract AppImage
        run: tar -xzf app-image-artifact/TarotBoard-linux-app-image.tar.gz

      - name: Create source tarball for Flatpak
        run: tar -czf .github/flatpak/source.tar.gz TarotBoard

      - name: Install Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak-builder
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        run: flatpak-builder build-dir .github/flatpak/com.mystic.tarotboard.json --force-clean --user --install-deps-from=flathub --repo=repo

      - name: Create Flatpak bundle
        run: flatpak build-bundle repo TarotBoard.flatpak com.mystic.tarotboard

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-build
          path: TarotBoard.flatpak
          compression-level: 0
          if-no-files-found: error

  headless-server-installers:
    name: Headless Server Installers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ app-image, deb, rpm ]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot rpm

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Headless Server ${{ matrix.type }}
        run: ./gradlew clean jpackage -PinstallerType=${{ matrix.type }} -PbuildServer=true

      - name: Archive Headless Server
        run: |
          if [ "${{ matrix.type }}" = "app-image" ]; then
            tar -czf TarotBoard-Server-${{ matrix.type }}.tar.gz -C build/jpackage TarotBoard-Server/
          else
            tar -czf TarotBoard-Server-${{ matrix.type }}.tar.gz -C build/jpackage .
          fi

      - name: Upload Headless Server
        uses: actions/upload-artifact@v4
        with:
          name: headless-server-${{ matrix.type }}-build
          path: TarotBoard-Server-${{ matrix.type }}.tar.gz
          compression-level: 6
          if-no-files-found: error

  headless-server-windows:
    name: Headless Server Windows (MSI + EXE)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ msi, exe ]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Headless Server ${{ matrix.type }}
        run: ./gradlew.bat clean jpackage -PinstallerType=${{ matrix.type }} -PbuildServer=true
        shell: cmd

      - name: Upload Headless Server ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: headless-server-windows-${{ matrix.type }}-build
          path: build/jpackage/TarotBoard-Server-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  server-jar:
    name: Headless Server Jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build server jar
        run: ./gradlew serverJar

      - name: Upload server jar
        uses: actions/upload-artifact@v4
        with:
          name: headless-server-jar-build
          path: build/libs/TarotBoard-Server-*.jar
          compression-level: 0
          if-no-files-found: error

  android:
    # Best effort, allowed to fail so it never blocks a release. JavaFX reaches
    # Android only through GluonFX/Substrate, which needs Gluon's own GraalVM fork
    # rather than any stock GraalVM: Substrate cross-compiles using the CAP cache it
    # ships, and that cache is generated against the fork. See build.gradle for why
    # GluonFX is pinned to 1.0.25 and why this GraalVM must stay in lockstep with it.
    # Gradle 8.14 because GluonFX does not support Gradle 9.
    name: Android APK (GluonFX, best effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    # Without this the job inherits the 6 hour default, and continue-on-error means a
    # hang burns all six of them and still reports the workflow green. Substrate takes
    # roughly 20 minutes when it is working, so an hour is generous.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # The runner ships an Android SDK of its own, around 13GB, against roughly 14GB
      # free — and Substrate then downloads a second SDK, an NDK, and a GraalVM on top.
      # Deleting the preinstalled one buys the room for that and, more importantly, is
      # what makes Substrate's SDK the only one on the machine: see the build step.
      - name: Free disk space
        run: |
          echo "--- before ---"; df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          echo "--- after ---"; df -h /

      # Gluon's GraalVM fork is not on setup-graalvm, so it is fetched by hand and
      # used as daemon JVM, compile toolchain, and native-image. It is pinned to the
      # exact release Substrate 0.0.65's CAP cache was generated against.
      - name: Setup Gluon GraalVM 23
        run: |
          set -euo pipefail
          URL="https://github.com/gluonhq/graal/releases/download/gluon-23%2B25.1-dev-2409082136/graalvm-java23-linux-amd64-gluon-23+25.1-dev.tar.gz"
          mkdir -p /tmp/graalvm
          curl -fsSL "$URL" -o /tmp/graalvm/graalvm.tar.gz
          tar -xzf /tmp/graalvm/graalvm.tar.gz -C /tmp/graalvm
          GRAALVM_DIR=$(find /tmp/graalvm -maxdepth 1 -mindepth 1 -type d -name "graalvm-*" | head -1)
          echo "GRAALVM_HOME=${GRAALVM_DIR}" >> "$GITHUB_ENV"
          echo "JAVA_HOME=${GRAALVM_DIR}" >> "$GITHUB_ENV"
          echo "${GRAALVM_DIR}/bin" >> "$GITHUB_PATH"

      - name: Setup Gradle 8.14
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.14'

      # Substrate manages its own SDK and NDK under ~/.gluon and only goes looking for
      # them elsewhere if the environment names somewhere else. The runner image names
      # somewhere else six times over — every one of these points into the preinstalled
      # SDK deleted above — and it takes only one survivor to send Substrate back there:
      # leaving ANDROID_HOME set had sdkmanager installing Platform 34 into the runner's
      # SDK (the "Archive is not a ZIP archive" stall), and leaving the NDK trio set had
      # it hunting ld.lld in a directory that no longer exists. Unset the lot.
      #
      # --stacktrace is not optional here: Substrate raises the real reason as the cause
      # of a bare "Failed to compile", and it validates the NDK *before* invoking
      # native-image, so a fault at this stage writes no process-compile log to fall back
      # on. Without the trace there is nothing to read at all.
      - name: Build Android APK
        run: |
          unset ANDROID_HOME ANDROID_SDK_ROOT \
                ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK_LATEST_HOME
          df -h /
          gradle nativeBuild nativePackage -PandroidBuild=true --stacktrace

      # Substrate writes the real native-image error to log files and prints only
      # "Compilation failed" to the console; without this step a failure here is
      # undiagnosable from the Actions page.
      - name: Show Substrate logs on failure
        if: failure()
        run: |
          find build/gluonfx -name "*.log" -exec sh -c 'echo "===== {} ====="; cat "{}"' \;

      - name: Upload Substrate logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-substrate-logs
          path: build/gluonfx/**/*.log
          if-no-files-found: ignore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-build
          path: build/gluonfx/**/*.apk
          compression-level: 0
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: github.ref == 'refs/heads/master'
    needs: [ windows, linux, flatpak, headless-server-installers, headless-server-windows, server-jar, android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Get version and construct tag
        id: get_version
        run: |
          VERSION=$(grep '^version = ' build.gradle | cut -d'"' -f2)
          TAG="v${VERSION}-${{ github.run_number }}"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "Generated tag: ${TAG}"

      - name: Create and Push Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ env.TAG }}"
          git push origin "${{ env.TAG }}"

      - name: List downloaded files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.TAG }}"
          files: artifacts/**/*
          body: "Automated release for build ${{ github.run_number }}."
          draft: false
          prerelease: false
