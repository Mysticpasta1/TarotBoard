name: Build Distributions

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  # ─── Windows: MSI + EXE ───────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ msi, exe ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build ${{ matrix.type }}
        run: ./gradlew.bat jpackage -PinstallerType=${{ matrix.type }}
        shell: cmd

      - name: Upload ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: TarotBoard-windows-${{ matrix.type }}
          path: build/jpackage/TarotBoard-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  # ─── Linux: AppImage (directory) ─────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fakeroot
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fakeroot

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build AppImage
        run: ./gradlew jpackage -PinstallerType=app-image

      - name: Archive AppImage
        run: tar -czf TarotBoard-linux-appimage.tar.gz -C build/jpackage TarotBoard/

      - name: Upload AppImage archive
        uses: actions/upload-artifact@v4
        with:
          name: TarotBoard-linux-appimage
          path: TarotBoard-linux-appimage.tar.gz
          compression-level: 6
          if-no-files-found: error

  # ─── Android: APK ──────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: [ actions/checkout@v4 ](https://github.com)

      - name: Set up JDK
        uses: [ actions/setup-java@v4 ](https://github.com)
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: [ actions/upload-artifact@v4 ](https://github.com)
        with:
          name: TarotBoard
          path: app/build/outputs/apk/debug/*.apk
