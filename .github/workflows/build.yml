name: Build And Release

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows (MSI + EXE)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ msi, exe ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build ${{ matrix.type }}
        run: ./gradlew.bat clean jpackage -PinstallerType=${{ matrix.type }}
        shell: cmd

      - name: Upload ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.type }}-build
          path: build/jpackage/TarotBoard-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  linux:
    name: Linux Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ app-image, deb, rpm ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot rpm

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build ${{ matrix.type }}
        run: ./gradlew clean jpackage -PinstallerType=${{ matrix.type }}

      - name: Archive Package
        run: |
          if [ "${{ matrix.type }}" = "app-image" ]; then
            tar -czf TarotBoard-linux-${{ matrix.type }}.tar.gz -C build/jpackage TarotBoard/
          else
            tar -czf TarotBoard-linux-${{ matrix.type }}.tar.gz -C build/jpackage .
          fi

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.type }}-build
          path: TarotBoard-linux-${{ matrix.type }}.tar.gz
          compression-level: 6
          if-no-files-found: error

  flatpak:
    name: Flatpak Build
    runs-on: ubuntu-latest
    needs: [ linux ]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-app-image-build
          path: app-image-artifact

      - name: Extract AppImage
        run: tar -xzf app-image-artifact/TarotBoard-linux-app-image.tar.gz

      - name: Create source tarball for Flatpak
        run: tar -czf .github/flatpak/source.tar.gz TarotBoard

      - name: Install Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak-builder
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        run: flatpak-builder build-dir .github/flatpak/com.mystic.tarotboard.json --force-clean --user --install-deps-from=flathub --repo=repo

      - name: Create Flatpak bundle
        run: flatpak build-bundle repo TarotBoard.flatpak com.mystic.tarotboard

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-build
          path: TarotBoard.flatpak
          compression-level: 0
          if-no-files-found: error

  headless-server-installers:
    name: Headless Server Installers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ app-image, deb, rpm ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot rpm

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Headless Server ${{ matrix.type }}
        run: ./gradlew clean jpackage -PinstallerType=${{ matrix.type }} -PbuildServer=true

      - name: Archive Headless Server
        run: |
          if [ "${{ matrix.type }}" = "app-image" ]; then
            tar -czf TarotBoard-Server-${{ matrix.type }}.tar.gz -C build/jpackage TarotBoard-Server/
          else
            tar -czf TarotBoard-Server-${{ matrix.type }}.tar.gz -C build/jpackage .
          fi

      - name: Upload Headless Server
        uses: actions/upload-artifact@v4
        with:
          name: headless-server-${{ matrix.type }}-build
          path: TarotBoard-Server-${{ matrix.type }}.tar.gz
          compression-level: 6
          if-no-files-found: error

  headless-server-windows:
    name: Headless Server Windows (MSI + EXE)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ msi, exe ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Headless Server ${{ matrix.type }}
        run: ./gradlew.bat clean jpackage -PinstallerType=${{ matrix.type }} -PbuildServer=true
        shell: cmd

      - name: Upload Headless Server ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: headless-server-windows-${{ matrix.type }}-build
          path: build/jpackage/TarotBoard-Server-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  server-jar:
    name: Headless Server Jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build server jar
        run: ./gradlew serverJar

      - name: Upload server jar
        uses: actions/upload-artifact@v4
        with:
          name: headless-server-jar-build
          path: build/libs/TarotBoard-Server-*.jar
          compression-level: 0
          if-no-files-found: error

  android:
    # Best effort: JavaFX only reaches Android through GluonFX/GraalVM native images,
    # and that toolchain trails the JDK. The job is allowed to fail so it never blocks
    # a release; it starts shipping an APK the day Gluon's toolchain supports this
    # project's JDK/JavaFX versions. It runs Gradle 8.14 because the GluonFX plugin
    # is not compatible with Gradle 9 yet.
    name: Android APK (GluonFX, best effort)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '26'
          distribution: 'graalvm'

      - name: Setup Gradle 8.14
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.14'

      - name: Build Android APK
        run: gradle nativeBuild nativePackage -PandroidBuild=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-build
          path: build/gluonfx/**/*.apk
          compression-level: 0
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: github.ref == 'refs/heads/master'
    needs: [ windows, linux, flatpak, headless-server-installers, headless-server-windows, server-jar, android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Get version and construct tag
        id: get_version
        run: |
          VERSION=$(grep '^version = ' build.gradle | cut -d'"' -f2)
          TAG="v${VERSION}-${{ github.run_number }}"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "Generated tag: ${TAG}"

      - name: Create and Push Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ env.TAG }}"
          git push origin "${{ env.TAG }}"

      - name: List downloaded files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.TAG }}"
          files: artifacts/**/*
          body: "Automated release for build ${{ github.run_number }}."
          draft: false
          prerelease: false
