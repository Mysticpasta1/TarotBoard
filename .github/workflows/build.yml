name: Build And Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows (MSI + EXE)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ msi, exe ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build ${{ matrix.type }}
        run: ./gradlew.bat clean jpackage -PinstallerType=${{ matrix.type }}
        shell: cmd

      - name: Upload ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.type }}-build
          path: build/jpackage/TarotBoard-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  linux:
    name: Linux Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ app-image, deb, rpm ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot rpm

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build ${{ matrix.type }}
        run: ./gradlew clean jpackage -PinstallerType=${{ matrix.type }}

      - name: Archive Package
        run: |
          if [ "${{ matrix.type }}" = "app-image" ]; then
            tar -czf TarotBoard-linux-${{ matrix.type }}.tar.gz -C build/jpackage TarotBoard/
          else
            tar -czf TarotBoard-linux-${{ matrix.type }}.tar.gz -C build/jpackage .
          fi

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.type }}-build
          path: TarotBoard-linux-${{ matrix.type }}.tar.gz
          compression-level: 6
          if-no-files-found: error

  flatpak:
    name: Flatpak Build
    runs-on: ubuntu-latest
    needs: [ linux ]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-app-image-build
          path: app-image-artifact

      - name: Extract AppImage
        run: tar -xzf app-image-artifact/TarotBoard-linux-app-image.tar.gz

      - name: Create source tarball for Flatpak
        run: tar -czf source.tar.gz TarotBoard

      - name: Install Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak-builder
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        run: flatpak-builder build-dir .github/flatpak/com.mystic.tarotboard.json --force-clean --user --install-deps-from=flathub --repo=repo

      - name: Create Flatpak bundle
        run: flatpak build-bundle repo TarotBoard.flatpak com.mystic.tarotboard

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-build
          path: TarotBoard.flatpak
          compression-level: 0
          if-no-files-found: error

  headless-server:
    name: Headless Server (JAR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Headless JAR
        run: ./gradlew headlessJar

      - name: Upload Headless JAR
        uses: actions/upload-artifact@v4
        with:
          name: headless-server-jar
          path: build/libs/*-headless.jar
          compression-level: 0
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ windows, linux, flatpak, headless-server ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          body: "New release of TarotBoard."
          draft: false
          prerelease: false
