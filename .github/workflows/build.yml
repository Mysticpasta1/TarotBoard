name: Build And Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows (MSI + EXE)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ msi, exe ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build ${{ matrix.type }}
        run: ./gradlew.bat clean jpackage -PinstallerType=${{ matrix.type }}
        shell: cmd

      - name: Upload ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.type }}-build
          path: build/jpackage/TarotBoard-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  linux:
    name: Linux Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ app-image, deb, rpm ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fakeroot rpm

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build ${{ matrix.type }}
        run: ./gradlew clean jpackage -PinstallerType=${{ matrix.type }}

      - name: Upload ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.type }}-build
          path: build/jpackage/TarotBoard-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  headless-server:
    name: Headless Server (JAR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Headless JAR
        run: ./gradlew headlessJar

      - name: Upload Headless JAR
        uses: actions/upload-artifact@v4
        with:
          name: headless-server-jar
          path: build/libs/*-headless.jar
          compression-level: 0
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, headless-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          body: "New release of TarotBoard."
          draft: false
          prerelease: false
