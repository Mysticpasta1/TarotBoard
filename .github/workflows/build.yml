name: Build Distributions

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  # ─── Windows: MSI + EXE ───────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        type: [ msi, exe ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build ${{ matrix.type }}
        run: ./gradlew.bat jpackage -PinstallerType=${{ matrix.type }}
        shell: cmd

      - name: Upload ${{ matrix.type }}
        uses: actions/upload-artifact@v4
        with:
          name: TarotBoard-windows-${{ matrix.type }}
          path: build/jpackage/TarotBoard-*.${{ matrix.type }}
          compression-level: 0
          if-no-files-found: error

  # ─── Linux: AppImage (directory) ─────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fakeroot
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fakeroot

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build AppImage
        run: ./gradlew jpackage -PinstallerType=app-image

      - name: Archive AppImage
        run: tar -czf TarotBoard-linux-appimage.tar.gz -C build/jpackage TarotBoard/

      - name: Upload AppImage archive
        uses: actions/upload-artifact@v4
        with:
          name: TarotBoard-linux-appimage
          path: TarotBoard-linux-appimage.tar.gz
          compression-level: 6
          if-no-files-found: error

  # ─── Android: APK ──────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM (provides native-image and JAVA_HOME)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform & build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build APK
        run: |
          ./gradlew nativeBuild
          ./gradlew nativePackage
        env:
          GRAALVM_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TarotBoard
          path: build/gluonfx/**/gvm/*.apk
          if-no-files-found: error
